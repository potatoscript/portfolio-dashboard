<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Health Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#10b981;
  --border:#1f2933;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:1rem;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

h1 { margin:0; }
.sub { color:var(--muted); font-size:.9rem; }

/* KPI CARDS */
.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  margin-top:1rem;
}

.kpi {
  background:var(--card);
  padding:1rem;
  border-radius:12px;
  border:1px solid var(--border);
}

.kpi h3 {
  margin:0;
  font-size:.9rem;
  color:var(--muted);
}

.kpi .value {
  font-size:1.8rem;
  font-weight:bold;
  margin-top:.5rem;
}

/* DASHBOARD GRID */
.dashboard {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:1rem;
  margin-top:1rem;
}

.card {
  background:var(--card);
  border-radius:12px;
  padding:1rem;
  border:1px solid var(--border);
}

canvas { margin-bottom:10px; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}

th, td {
  padding:.5rem;
  border-bottom:1px solid var(--border);
}

th { color:var(--muted); text-align:left; }

.score { color:var(--warn); font-weight:bold; }

.badge {
  padding:2px 6px;
  border-radius:6px;
  font-size:.75rem;
}

.badge.danger { background:#7f1d1d; color:#fecaca; }
.badge.warn { background:#78350f; color:#fde68a; }
.badge.ok { background:#064e3b; color:#6ee7b7; }

.empty {
  color:var(--muted);
  font-style:italic;
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Project Health Dashboard</h1>
  <p id="generatedAt" class="sub">Loading...</p>
</div>

<!-- KPI SUMMARY -->
<div class="kpis">
  <div class="kpi">
    <h3>Overdue</h3>
    <div id="kpiOverdue" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>Urgent</h3>
    <div id="kpiUrgent" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>At Risk</h3>
    <div id="kpiRisk" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>Team Load</h3>
    <div id="kpiUsers" class="value">0</div>
  </div>
</div>

<div class="dashboard">

  <!-- STATUS -->
  <div class="card">
    <h2>Status Overview</h2>
    <canvas id="statusChart"></canvas>
  </div>

  <!-- OVERDUE -->
  <div class="card">
    <h2>🔥 Overdue Issues</h2>
    <canvas id="overdueChart"></canvas>
    <table><tbody id="overdue"></tbody></table>
  </div>

  <!-- URGENT -->
  <div class="card">
    <h2>⚠️ Urgent Issues</h2>
    <canvas id="urgentChart"></canvas>
    <table><tbody id="urgent"></tbody></table>
  </div>

  <!-- TEAM -->
  <div class="card">
    <h2>👤 Team Load</h2>
    <canvas id="userChart"></canvas>
    <table><tbody id="users"></tbody></table>
  </div>

  <!-- AI PREDICTION -->
  <div class="card">
    <h2>🤖 Risk Prediction</h2>
    <table><tbody id="predictions"></tbody></table>
  </div>

  <!-- TIMELINE -->
  <div class="card">
    <h2>⏱ Timeline Health</h2>
    <table><tbody id="timeline"></tbody></table>
  </div>

</div>

<script>
fetch("overdue.json")
.then(r => r.json())
.then(data => {

  document.getElementById("generatedAt").textContent =
    "Updated: " + new Date(data.generatedAt).toLocaleString();

  // =====================
  // KPI
  // =====================
  document.getElementById("kpiOverdue").textContent = data.overdueCount || 0;
  document.getElementById("kpiUrgent").textContent = data.urgentCount || 0;
  document.getElementById("kpiRisk").textContent = data.predictions?.length || 0;
  document.getElementById("kpiUsers").textContent = data.overloadedUsers?.length || 0;

  // =====================
  // STATUS CHART
  // =====================
  new Chart(document.getElementById("statusChart"), {
    type: "doughnut",
    data: {
      labels: ["Overdue", "Urgent"],
      datasets: [{
        data: [data.overdueCount || 0, data.urgentCount || 0],
        backgroundColor: ["#ef4444", "#f59e0b"]
      }]
    }
  });

  // =====================
  // CHARTS
  // =====================
  const createBar = (id, labels, values, label) => {
    if (!labels.length) return;
    new Chart(document.getElementById(id), {
      type: "bar",
      data: {
        labels,
        datasets: [{ label, data: values }]
      }
    });
  };

  createBar("overdueChart",
    data.topOverdue.map(i => "#" + i.number),
    data.topOverdue.map(i => i.daysOverdue),
    "Days Overdue"
  );

  createBar("urgentChart",
    data.urgentItems.map(i => "#" + i.number),
    data.urgentItems.map(i => i.daysLeft),
    "Days Left"
  );

  createBar("userChart",
    data.overloadedUsers.map(u => u.user),
    data.overloadedUsers.map(u => u.score),
    "Score"
  );

  // =====================
  // TABLE HELPER
  // =====================
  const fill = (id, arr, fn) => {
    const el = document.getElementById(id);
    el.innerHTML = "";

    if (!arr || !arr.length) {
      el.innerHTML = `<tr><td class="empty">No data</td></tr>`;
      return;
    }

    arr.forEach(i => el.insertAdjacentHTML("beforeend", fn(i)));
  };

  const link = i =>
    `<a href="https://github.com/${i.repo}/issues/${i.number}" target="_blank">#${i.number}</a>`;

  // =====================
  // TABLES
  // =====================
  fill("overdue", data.topOverdue, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysOverdue}d</td></tr>`);

  fill("urgent", data.urgentItems, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysLeft}d</td></tr>`);

  fill("users", data.overloadedUsers, u =>
    `<tr><td>${u.user}</td><td>${u.overdue}</td><td>${u.urgent}</td><td class="score">${u.score}</td></tr>`);

  fill("predictions", data.predictions, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td><span class="badge danger">${i.prediction}</span></td></tr>`);

  fill("timeline", data.timeline, i => {
    let badge = "ok";
    if (i.status === "delayed") badge = "danger";
    else if (i.status === "at-risk") badge = "warn";

    return `<tr>
      <td>#${i.number}</td>
      <td>${i.title}</td>
      <td><span class="badge ${badge}">${i.status}</span></td>
    </tr>`;
  });

})
.catch(err => {
  console.error(err);
  document.getElementById("generatedAt").textContent =
    "Failed to load dashboard data";
});
</script>

</body>
</html>
