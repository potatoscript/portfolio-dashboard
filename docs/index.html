<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Health Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#0b1220;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:#1f2937;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#10b981;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  padding:20px;
  border-bottom:1px solid var(--border);
}

.header h1 {
  margin:0;
  font-size:20px;
}

.sub {
  color:var(--muted);
  font-size:13px;
}

/* KPI STRIP */
.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  padding:20px;
}

.kpi {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
}

.kpi .label {
  font-size:12px;
  color:var(--muted);
}

.kpi .value {
  font-size:26px;
  font-weight:bold;
  margin-top:6px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
}

.card h2 {
  margin:0 0 10px 0;
  font-size:16px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th {
  text-align:left;
  color:var(--muted);
  padding:8px 6px;
}

td {
  padding:8px 6px;
  border-top:1px solid var(--border);
}

/* BADGES */
.badge {
  padding:3px 8px;
  border-radius:6px;
  font-size:11px;
  font-weight:600;
}

.badge.red { background:#7f1d1d; color:#fecaca; }
.badge.orange { background:#78350f; color:#fde68a; }
.badge.green { background:#064e3b; color:#6ee7b7; }

.empty {
  color:var(--muted);
  font-style:italic;
  padding:10px;
}

canvas {
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>📊 Project Health Dashboard</h1>
  <div id="generatedAt" class="sub">Loading...</div>
</div>

<!-- KPI -->
<div class="kpis">
  <div class="kpi"><div class="label">Overdue</div><div id="kpiOverdue" class="value">0</div></div>
  <div class="kpi"><div class="label">Urgent</div><div id="kpiUrgent" class="value">0</div></div>
  <div class="kpi"><div class="label">At Risk</div><div id="kpiRisk" class="value">0</div></div>
  <div class="kpi"><div class="label">Team Members</div><div id="kpiUsers" class="value">0</div></div>
</div>

<div class="grid">

  <!-- STATUS -->
  <div class="card">
    <h2>Status Overview</h2>
    <canvas id="statusChart"></canvas>
  </div>

  <!-- OVERDUE -->
  <div class="card">
    <h2>Overdue Issues</h2>
    <canvas id="overdueChart"></canvas>
    <table>
      <thead>
        <tr><th>Issue</th><th>Title</th><th>Days</th></tr>
      </thead>
      <tbody id="overdue"></tbody>
    </table>
  </div>

  <!-- URGENT -->
  <div class="card">
    <h2>Urgent Issues</h2>
    <canvas id="urgentChart"></canvas>
    <table>
      <thead>
        <tr><th>Issue</th><th>Title</th><th>Days Left</th></tr>
      </thead>
      <tbody id="urgent"></tbody>
    </table>
  </div>

  <!-- TEAM -->
  <div class="card">
    <h2>Team Load</h2>
    <canvas id="userChart"></canvas>
    <table>
      <thead>
        <tr><th>User</th><th>Overdue</th><th>Urgent</th><th>Score</th></tr>
      </thead>
      <tbody id="users"></tbody>
    </table>
  </div>

  <!-- AI -->
  <div class="card">
    <h2>AI Risk Prediction</h2>
    <table>
      <thead>
        <tr><th>Issue</th><th>Title</th><th>Status</th></tr>
      </thead>
      <tbody id="predictions"></tbody>
    </table>
  </div>

  <!-- TIMELINE -->
  <div class="card">
    <h2>Timeline Health</h2>
    <table>
      <thead>
        <tr><th>Issue</th><th>Title</th><th>Status</th></tr>
      </thead>
      <tbody id="timeline"></tbody>
    </table>
  </div>

</div>

<script>
fetch("overdue.json")
.then(r => r.json())
.then(data => {

  document.getElementById("generatedAt").textContent =
    "Updated: " + new Date(data.generatedAt).toLocaleString();

  // KPI
  kpiOverdue.textContent = data.overdueCount || 0;
  kpiUrgent.textContent = data.urgentCount || 0;
  kpiRisk.textContent = data.predictions?.length || 0;
  kpiUsers.textContent = data.overloadedUsers?.length || 0;

  // STATUS CHART
  new Chart(statusChart, {
    type:"doughnut",
    data:{
      labels:["Overdue","Urgent"],
      datasets:[{
        data:[data.overdueCount||0, data.urgentCount||0],
        backgroundColor:["#ef4444","#f59e0b"]
      }]
    }
  });

  // CHART HELPER
  const bar = (id, labels, values) => {
    if (!labels.length) return;
    new Chart(document.getElementById(id), {
      type:"bar",
      data:{ labels, datasets:[{ data:values }] }
    });
  };

  bar("overdueChart",
    data.topOverdue.map(i=>"#"+i.number),
    data.topOverdue.map(i=>i.daysOverdue)
  );

  bar("urgentChart",
    data.urgentItems.map(i=>"#"+i.number),
    data.urgentItems.map(i=>i.daysLeft)
  );

  bar("userChart",
    data.overloadedUsers.map(u=>u.user),
    data.overloadedUsers.map(u=>u.score)
  );

  // TABLE HELPER
  const fill = (id, arr, fn) => {
    const el = document.getElementById(id);
    el.innerHTML="";
    if (!arr?.length) {
      el.innerHTML=`<tr><td class="empty">No data</td></tr>`;
      return;
    }
    arr.forEach(i=>el.insertAdjacentHTML("beforeend", fn(i)));
  };

  const link = i =>
    `<a href="https://github.com/${i.repo}/issues/${i.number}" target="_blank">#${i.number}</a>`;

  fill("overdue", data.topOverdue, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysOverdue}</td></tr>`);

  fill("urgent", data.urgentItems, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysLeft}</td></tr>`);

  fill("users", data.overloadedUsers, u =>
    `<tr><td>${u.user}</td><td>${u.overdue}</td><td>${u.urgent}</td><td>${u.score}</td></tr>`);

  fill("predictions", data.predictions, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td><span class="badge red">${i.prediction}</span></td></tr>`);

  fill("timeline", data.timeline, i => {
    let cls="green";
    if(i.status==="delayed") cls="red";
    else if(i.status==="at-risk") cls="orange";
    return `<tr><td>#${i.number}</td><td>${i.title}</td><td><span class="badge ${cls}">${i.status}</span></td></tr>`;
  });

});
</script>

</body>
</html>
