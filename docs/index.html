<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#10b981;
  --border:#1f2933;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  padding:1rem;
}

h1 { margin-bottom:0; }
.sub { color:var(--muted); }

.dashboard {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:1rem;
  margin-top:1rem;
}

.card {
  background:var(--card);
  border-radius:12px;
  padding:1rem;
  border:1px solid var(--border);
}

canvas {
  margin-bottom:10px;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}

th, td {
  padding:.5rem;
  border-bottom:1px solid var(--border);
}

th { color:var(--muted); }

.score { color:var(--warn); font-weight:bold; }

.empty {
  color:var(--muted);
  font-style:italic;
}
</style>
</head>

<body>

<h1>📊 Project Dashboard</h1>
<p id="generatedAt" class="sub">Loading...</p>

<div class="dashboard">

  <div class="card">
    <h2>Status</h2>
    <canvas id="statusChart"></canvas>
  </div>

  <div class="card">
    <h2>Overdue</h2>
    <canvas id="overdueChart"></canvas>
    <table><tbody id="overdue"></tbody></table>
  </div>

  <div class="card">
    <h2>Urgent</h2>
    <canvas id="urgentChart"></canvas>
    <table><tbody id="urgent"></tbody></table>
  </div>

  <div class="card">
    <h2>Team Load</h2>
    <canvas id="userChart"></canvas>
    <table><tbody id="users"></tbody></table>
  </div>

</div>

<script>
fetch("overdue.json")
.then(r => r.json())
.then(data => {

  // =====================
  // HEADER
  // =====================
  document.getElementById("generatedAt").textContent =
    "Updated: " + new Date(data.generatedAt).toLocaleString();

  // =====================
  // SAFE DATA
  // =====================
  const overdueCount = data.overdueCount || 0;
  const urgentCount  = data.urgentCount || 0;

  // =====================
  // STATUS CHART (FIXED)
  // =====================
  if (overdueCount + urgentCount > 0) {
    new Chart(document.getElementById("statusChart"), {
      type: "doughnut",
      data: {
        labels: ["Overdue", "Urgent"],
        datasets: [{
          data: [
            overdueCount,
            urgentCount === 0 ? 0.1 : urgentCount
          ],
          backgroundColor: ["#ef4444", "#f59e0b"]
        }]
      }
    });
  }

  // =====================
  // OVERDUE CHART
  // =====================
  if (data.topOverdue?.length) {
    new Chart(document.getElementById("overdueChart"), {
      type: "bar",
      data: {
        labels: data.topOverdue.map(i => "#" + i.number),
        datasets: [{
          label: "Days Overdue",
          data: data.topOverdue.map(i => i.daysOverdue)
        }]
      }
    });
  }

  // =====================
  // URGENT CHART
  // =====================
  if (data.urgentItems?.length) {
    new Chart(document.getElementById("urgentChart"), {
      type: "bar",
      data: {
        labels: data.urgentItems.map(i => "#" + i.number),
        datasets: [{
          label: "Days Left",
          data: data.urgentItems.map(i => Math.max(i.daysLeft, 1))
        }]
      }
    });
  }

  // =====================
  // USER CHART
  // =====================
  if (data.overloadedUsers?.length) {
    new Chart(document.getElementById("userChart"), {
      type: "bar",
      data: {
        labels: data.overloadedUsers.map(u => u.user),
        datasets: [{
          label: "Score",
          data: data.overloadedUsers.map(u => u.score)
        }]
      }
    });
  }

  // =====================
  // TABLE HELPERS
  // =====================
  const fill = (id, arr, fn) => {
    const el = document.getElementById(id);
    el.innerHTML = "";

    if (!arr || !arr.length) {
      el.innerHTML = `<tr><td class="empty">No data</td></tr>`;
      return;
    }

    arr.forEach(i => {
      el.insertAdjacentHTML("beforeend", fn(i));
    });
  };

  const link = i =>
    `<a href="https://github.com/${i.repo}/issues/${i.number}" target="_blank">#${i.number}</a>`;

  // =====================
  // TABLES
  // =====================
  fill("overdue", data.topOverdue, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysOverdue}d</td></tr>`);

  fill("urgent", data.urgentItems, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysLeft}d</td></tr>`);

  fill("users", data.overloadedUsers, u =>
    `<tr><td>${u.user}</td><td>${u.overdue}</td><td>${u.urgent}</td><td class="score">${u.score}</td></tr>`);

})
.catch(err => {
  console.error(err);
  document.getElementById("generatedAt").textContent =
    "Failed to load dashboard data";
});
</script>

</body>
</html>
