<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio Project Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;

  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#10b981;
  --primary:#6366f1;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  color:var(--text);
  padding:2rem;
}

h1 {
  margin:0;
  font-size:28px;
}

.sub {
  color:var(--muted);
  margin-bottom:20px;
}

/* ===================== */
/* KPI CARDS */
/* ===================== */
.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  margin-bottom:1.5rem;
}

.kpi {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1rem;
}

.kpi h3 {
  margin:0;
  font-size:14px;
  color:var(--muted);
}

.kpi .value {
  font-size:26px;
  font-weight:bold;
  margin-top:5px;
}

/* ===================== */
/* GRID */
/* ===================== */
.dashboard {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:1rem;
}

.card {
  background:var(--card);
  border-radius:14px;
  padding:1rem;
  border:1px solid var(--border);
}

.card h2 {
  margin-top:0;
  font-size:18px;
}

/* ===================== */
/* TABLE */
/* ===================== */
table {
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}

th, td {
  padding:.6rem;
  border-bottom:1px solid var(--border);
}

th {
  text-align:left;
  color:var(--muted);
}

.badge {
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
}

.badge-danger { background:#fee2e2; color:#b91c1c; }
.badge-warn   { background:#fef3c7; color:#92400e; }
.badge-ok     { background:#dcfce7; color:#166534; }

.progress {
  height:6px;
  background:#e5e7eb;
  border-radius:4px;
  overflow:hidden;
}

.progress div {
  height:100%;
  background:var(--primary);
}

.empty {
  color:var(--muted);
  font-style:italic;
}

a {
  color:var(--primary);
  text-decoration:none;
}


.gantt-row {
  margin-bottom: 12px;
}

.gantt-label {
  font-size: 12px;
  margin-bottom: 4px;
}

.gantt-bar {
  height: 18px;
  border-radius: 6px;
  position: relative;
  background: #e5e7eb;
}

.gantt-fill {
  height: 100%;
  border-radius: 6px;
  position: absolute;
}

.gantt-delayed { background: #ef4444; }
.gantt-risk    { background: #f59e0b; }
.gantt-ok      { background: #10b981; }

.card {
  transition: all .3s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.fade-in {
  animation: fadeIn .6s ease forwards;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}


body.dark {
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --border:#1f2933;
}
  
</style>
</head>

<body>

<h1>📊 Project Dashboard</h1>
<p id="generatedAt" class="sub">Loading...</p>

<!-- KPI -->
<div class="kpis">
  <div class="kpi">
    <h3>Overdue</h3>
    <div id="kpiOverdue" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>Urgent</h3>
    <div id="kpiUrgent" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>At Risk</h3>
    <div id="kpiRisk" class="value">0</div>
  </div>
  <div class="kpi">
    <h3>Total Tasks</h3>
    <div id="kpiTotal" class="value">0</div>
  </div>
</div>

<div class="dashboard">

  <div class="card">
    <h2>📅 Timeline (Gantt)</h2>
    <div id="gantt"></div>
  </div>

  <select id="repoSelect"></select>
  <button onclick="toggleTheme()">🌗 Toggle Theme</button>
  
  <div style="margin-bottom:1rem;">
    <select id="filterUser"></select>
    <select id="filterStatus">
      <option value="">All Status</option>
      <option value="delayed">Delayed</option>
      <option value="at-risk">At Risk</option>
      <option value="on-track">On Track</option>
    </select>
  </div>
    
  <!-- STATUS -->
  <div class="card">
    <h2>Status Overview</h2>
    <canvas id="statusChart"></canvas>
  </div>

  <!-- OVERDUE -->
  <div class="card">
    <h2>Overdue Issues</h2>
    <canvas id="overdueChart"></canvas>
    <table>
      <thead>
        <tr><th>ID</th><th>Title</th><th>Days</th></tr>
      </thead>
      <tbody id="overdue"></tbody>
    </table>
  </div>

  <!-- URGENT -->
  <div class="card">
    <h2>Urgent Issues</h2>
    <canvas id="urgentChart"></canvas>
    <table>
      <thead>
        <tr><th>ID</th><th>Title</th><th>Days Left</th></tr>
      </thead>
      <tbody id="urgent"></tbody>
    </table>
  </div>

  <!-- TEAM -->
  <div class="card">
    <h2>Team Load</h2>
    <canvas id="userChart"></canvas>
    <table>
      <thead>
        <tr><th>User</th><th>Overdue</th><th>Urgent</th><th>Score</th></tr>
      </thead>
      <tbody id="users"></tbody>
    </table>
  </div>

  <!-- PREDICTIONS -->
  <div class="card">
    <h2>⚠️ AI Predictions</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Title</th><th>Risk</th></tr>
      </thead>
      <tbody id="predictions"></tbody>
    </table>
  </div>

  <!-- TIMELINE -->
  <div class="card">
    <h2>📅 Timeline Health</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Title</th><th>Status</th><th>Progress</th></tr>
      </thead>
      <tbody id="timeline"></tbody>
    </table>
  </div>

</div>

<script>
fetch("overdue.json")
.then(r => r.json())
.then(data => {

  initFilters(data);
  initRepos(data);

  const filtered = applyFilters(data);

  renderGantt(filtered);
  
  document.getElementById("generatedAt").textContent =
    "Updated: " + new Date(data.generatedAt).toLocaleString();

  // KPI
  document.getElementById("kpiOverdue").textContent = data.overdueCount || 0;
  document.getElementById("kpiUrgent").textContent = data.urgentCount || 0;
  document.getElementById("kpiRisk").textContent = data.predictions?.length || 0;
  document.getElementById("kpiTotal").textContent =
    (data.overdueCount || 0) + (data.urgentCount || 0);

  // STATUS CHART
  new Chart(document.getElementById("statusChart"), {
    type: "doughnut",
    data: {
      labels: ["Overdue","Urgent"],
      datasets: [{
        data: [data.overdueCount || 0, data.urgentCount || 0]
      }]
    }
  });

  // HELPERS
  const fill = (id, arr, fn) => {
    const el = document.getElementById(id);
    el.innerHTML = "";

    if (!arr || !arr.length) {
      el.innerHTML = `<tr><td colspan="4" class="empty">No data</td></tr>`;
      return;
    }

    arr.forEach(i => el.insertAdjacentHTML("beforeend", fn(i)));
  };

  const link = i =>
    `<a href="https://github.com/${i.repo}/issues/${i.number}" target="_blank">#${i.number}</a>`;

  // TABLES
  fill("overdue", data.topOverdue, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysOverdue}</td></tr>`);

  fill("urgent", data.urgentItems, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td>${i.daysLeft}</td></tr>`);

  fill("users", data.overloadedUsers, u =>
    `<tr><td>${u.user}</td><td>${u.overdue}</td><td>${u.urgent}</td><td>${u.score}</td></tr>`);

  fill("predictions", data.predictions, i =>
    `<tr><td>${link(i)}</td><td>${i.title}</td><td><span class="badge badge-danger">High</span></td></tr>`);

  fill("timeline", data.timeline, t => {
    let badge = "badge-ok";
    if (t.status === "delayed") badge = "badge-danger";
    else if (t.status === "at-risk") badge = "badge-warn";

    return `
      <tr>
        <td>#${t.number}</td>
        <td>${t.title}</td>
        <td><span class="badge ${badge}">${t.status}</span></td>
        <td>
          <div class="progress">
            <div style="width:${t.progress || 0}%"></div>
          </div>
        </td>
      </tr>
    `;
  });

});


function renderGantt(data) {
  const el = document.getElementById("gantt");
  el.innerHTML = "";

  if (!data.timeline?.length) {
    el.innerHTML = "<p class='empty'>No timeline data</p>";
    return;
  }

  data.timeline.forEach(task => {
    const width = task.progress || 10;

    let cls = "gantt-ok";
    if (task.status === "delayed") cls = "gantt-delayed";
    else if (task.status === "at-risk") cls = "gantt-risk";

    el.insertAdjacentHTML("beforeend", `
      <div class="gantt-row">
        <div class="gantt-label">#${task.number} - ${task.title}</div>
        <div class="gantt-bar">
          <div class="gantt-fill ${cls}" style="width:${width}%"></div>
        </div>
      </div>
    `);
  });
}

document.querySelectorAll(".card").forEach((c, i) => {
  c.classList.add("fade-in");
  c.style.animationDelay = (i * 0.1) + "s";
});  

function initFilters(data) {
  const users = [...new Set(data.overloadedUsers.map(u => u.user))];

  const userSelect = document.getElementById("filterUser");

  userSelect.innerHTML = `<option value="">All Users</option>` +
    users.map(u => `<option>${u}</option>`).join("");
}  

function applyFilters(data) {
  const user = document.getElementById("filterUser").value;

  if (!user) return data;

  return {
    ...data,
    topOverdue: data.topOverdue.filter(i => i.user === user),
    urgentItems: data.urgentItems.filter(i => i.user === user)
  };
}  

function initRepos(data) {
  const repos = [...new Set(
    [...data.topOverdue, ...data.urgentItems].map(i => i.repo)
  )];

  const el = document.getElementById("repoSelect");

  el.innerHTML =
    `<option value="">All Repos</option>` +
    repos.map(r => `<option>${r}</option>`).join("");
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}
  
</script>

</body>
</html>
