name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Fetch Issues
        run: |
          curl https://api.github.com/repos/${{ github.repository }}/issues > issues.json

      - name: Generate JSON
        run: node generate.js
        env:
          REPO: ${{ github.repository }}

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add docs/overdue.json
          git commit -m "update dashboard" || echo "no change"
          git push
