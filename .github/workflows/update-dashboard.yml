name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =====================
      # Setup Node
      # =====================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =====================
      # Fetch Project Data (FIXED)
      # =====================
      - name: Fetch project data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "📡 Fetching project data..."
      
          cat <<EOF > query.json
          {
            "query": "query {
              viewer {
                projectsV2(first: 10) {
                  nodes {
                    title
                    items(first: 100) {
                      nodes {
                        content {
                          ... on Issue {
                            number
                            title
                            url
                            updatedAt
                            createdAt
                            assignees(first: 1) {
                              nodes { login }
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldDateValue {
                              field { name }
                              date
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }"
          }
          EOF
      
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @query.json > project.json
      
          echo "📄 DEBUG RESPONSE:"
          cat project.json

      # =====================
      # Generate Dashboard JSON
      # =====================
      - name: Generate JSON
        run: node generate.js
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # =====================
      # Debug Output
      # =====================
      - name: Show generated JSON
        run: |
          echo "📊 Generated overdue.json:"
          cat docs/overdue.json

      # =====================
      # Commit & Push
      # =====================
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/overdue.json

          git commit -m "update dashboard" || echo "no change"

          git push
